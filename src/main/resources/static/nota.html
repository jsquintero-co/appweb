<!DOCTYPE html>
<html lang="es">

<head>

    <meta charset="UTF-8">

    <title>Gestión de Notas</title>

    <style>

        body{
            font-family: Arial;
            margin: 30px;
            background: #f4f4f4;
        }

        .container{
            background: white;
            padding: 20px;
            border-radius: 10px;
        }

        table{
            width: 100%;
            border-collapse: collapse;
            margin-top: 20px;
        }

        th, td{
            border: 1px solid #ccc;
            padding: 10px;
            text-align: center;
        }

        input{
            margin: 5px;
            padding: 8px;
        }

        button{
            padding: 8px 15px;
            margin: 3px;
            cursor: pointer;
        }

        .btn-eliminar{
            background: #d9534f;
            color: white;
            border: none;
        }

        .btn-volver{
            background: #666;
            color: white;
            border: none;
        }

        .btn-calcular{
            background: #5cb85c;
            color: white;
            border: none;
        }

    </style>

</head>

<body>

<div class="container">

    <h1>Gestión de Notas</h1>

    <button
        class="btn-volver"
        onclick="volver()">

        Volver

    </button>

    <h3 id="tituloEstudiante"></h3>

    <form id="formNota">

        <input
            type="text"
            id="materia"
            required>

        <input
            type="number"
            step="0.1"
            min="0"
            max="5"
            id="valor"
            placeholder="Nota"
            required>

        <input
            type="number"
            min="0"
            max="100"
            id="porcentaje"
            placeholder="%"
            required>

        <input
            type="text"
            id="observacion"
            placeholder="Observación">

        <button type="submit">
            Guardar Nota
        </button>

    </form>

    <button
        class="btn-calcular"
        onclick="calcularNotaFinal()">

        Calcular Nota Final

    </button>

    <h2>Lista de Notas</h2>

    <table>

        <thead>

        <tr>
            <th>ID</th>
            <th>Materia</th>
            <th>Nota</th>
            <th>Porcentaje</th>
            <th>Observación</th>
            <th>Acciones</th>
        </tr>

        </thead>

        <tbody id="tablaNotas">

        </tbody>

    </table>

</div>

<script src="js/nota.js"></script>

</body>

</html>
