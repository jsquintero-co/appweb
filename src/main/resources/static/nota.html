<!DOCTYPE html>
<html lang="es">

<head>

    <meta charset="UTF-8">

    <title>Notas</title>

    <style>

        body{
            font-family: Arial;
            margin: 30px;
        }

        table{
            width: 100%;
            border-collapse: collapse;
            margin-top: 20px;
        }

        th, td{
            border: 1px solid #ccc;
            padding: 10px;
            text-align: center;
        }

        input, select{
            margin: 5px;
            padding: 8px;
        }

        button{
            padding: 8px 15px;
            margin: 5px;
        }

        #resumen{
            margin-top: 20px;
            padding: 15px;
            border: 1px solid #ccc;
        }

    </style>

</head>

<body>

<h1 id="tituloEstudiante"></h1>

<h2>Registrar Nota</h2>

<form id="formNota">

    <select id="materia" required></select>

    <input
        type="number"
        id="valor"
        step="0.1"
        min="0"
        max="5"
        placeholder="Nota"
        required
    >

    <input
        type="number"
        id="porcentaje"
        min="1"
        max="100"
        placeholder="%"
        required
    >

    <input
        type="text"
        id="observacion"
        placeholder="Observación"
    >

    <button type="submit">
        Guardar Nota
    </button>

</form>

<button onclick="calcularNotaFinal()">
    Calcular Nota Final
</button>

<button onclick="volver()">
    Volver
</button>

<div id="resumen"></div>

<table>

    <thead>

        <tr>

            <th>ID</th>
            <th>Materia</th>
            <th>Nota</th>
            <th>Porcentaje</th>
            <th>Observación</th>
            <th>Acciones</th>

        </tr>

    </thead>

    <tbody id="tablaNotas"></tbody>

</table>

<script src="js/nota.js"></script>

</body>

</html>
